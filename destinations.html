  <main class="container">
    <div class="panel">
      <h2 class="hTitle">وجهاتنا</h2>
      <p class="muted">اختاري منطقة من الخريطة أو من الأزرار، ثم اضغطي على مدينة لعرض باقاتها.</p>
    </div>

    <section class="destWrap" style="margin-top:14px;">
     <div class="mapBox">
  <svg id="ksaMap" viewBox="0 0 600 700" role="img" aria-label="خريطة المملكة العربية السعودية">
    <!-- شكل السعودية (Stylized) -->
    <path id="ksaOutline" class="ksa-outline"
      d="M160 120
         L250 90 L330 110 L410 160 L470 250
         L520 320 L540 420 L500 540
         L420 620 L310 650 L220 620
         L180 560 L140 470 L130 360
         L150 250 Z"/>

    <!-- نقاط تفاعلية للمناطق -->
    <!-- مكة -->
    <g class="hotspot" data-region="makkah">
      <circle class="hotspot-dot" cx="245" cy="360" r="11"></circle>
      <text class="hotspot-label" x="265" y="365">مكة</text>
    </g>

    <!-- الرياض -->
    <g class="hotspot" data-region="riyadh">
      <circle class="hotspot-dot" cx="345" cy="330" r="11"></circle>
      <text class="hotspot-label" x="365" y="335">الرياض</text>
    </g>

    <!-- عسير -->
    <g class="hotspot" data-region="asir">
      <circle class="hotspot-dot" cx="260" cy="470" r="11"></circle>
      <text class="hotspot-label" x="280" y="475">عسير</text>
    </g>

    <!-- الشرقية -->
    <g class="hotspot" data-region="eastern">
      <circle class="hotspot-dot" cx="440" cy="335" r="11"></circle>
      <text class="hotspot-label" x="460" y="340">الشرقية</text>
    </g>
  </svg>

  <p class="muted" style="margin:10px 0 0">اضغطي على نقطة المنطقة لعرض المدن والباقات المقترحة.</p>
</div>

      <div id="destPanel" class="panel">
        <div class="chips" id="regionList"></div>

        <h3 class="sectionTitle" id="regionTitle">—</h3>
        <p class="muted" id="regionHint">—</p>

        <div class="cityList" id="cityList"></div>
      </div>
    </section>

    <footer class="footer">
      <div>© <span id="year"></span> <span class="brandName">آفاق السفر</span></div>
    </footer>
  </main>
<script src="./assets/js/app.js"></script> 
  <script type="module" src="assets/js/app.js"></script>
